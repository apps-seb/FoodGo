    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

      body { font-family: 'Inter', sans-serif; background-color: #fafafa; }

      /* Utilidades Ocultar Scrollbar */
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* Animaciones */
      @keyframes bounce-short {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-3px); }
      }
      .animate-bounce-short { animation: bounce-short 0.4s ease-in-out; }

      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }

      @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
      .slide-in-right { animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

      @keyframes pulse-ring {
          0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
          70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
          100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
      }
      .animate-pulse-ring { animation: pulse-ring 2s infinite; }

      /* Estilos Drag and Drop Plano */
      .table-item { transition: transform 0.1s, box-shadow 0.2s; touch-action: none; user-select: none; }
      .table-item:active { transform: scale(1.05); cursor: grabbing !important; }
      .table-item.dragging { opacity: 0.9; z-index: 50; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }

      /* Grilla Fondo */
      .floor-grid {
          background-color: #f4f4f5;
          background-image: radial-gradient(#e4e4e7 1px, transparent 1px);
          background-size: 24px 24px;
      }

      /* Tostadas Temporales */
      .toast-notification { transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
      .toast-notification.hide { opacity: 0; transform: translateX(120%); }

      /* Estilos Formularios */
      .input-pro { w-full; padding: 0.75rem 1rem; border-radius: 0.75rem; border: 1px solid #e4e4e7; background-color: #fafafa; transition: all 0.2s; outline: none; }
      .input-pro:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); background-color: #ffffff; }
    </style>
  </head>

      // --- SISTEMA DE NOTIFICACIONES (Historial + Toast) ---
      function notify(msg, type = "success") {
        const now = new Date();
        const timeStr = now.toLocaleTimeString("es-CO", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });

        // Guardar en historial
        state.notifications.unshift({
          id: Date.now(),
          msg,
          type,
          time: timeStr,
        });
        if (state.notifications.length > 50) state.notifications.pop(); // Limite

        // Actualizar vista si el panel está abierto o el badge de campana
        renderHeaderBadges();
        if (state.isNotifPanelOpen) renderNotificationPanel();

        // Mostrar Toast temporal
        const container = document.getElementById("toast-container");
        const id = "toast-" + Date.now();

        const colorMap = {
          success: { bg: "bg-emerald-500", icon: "ph-check-circle" },
          warning: { bg: "bg-amber-500", icon: "ph-warning" },
          info: { bg: "bg-indigo-500", icon: "ph-info" },
          error: { bg: "bg-red-500", icon: "ph-x-circle" },
        };
        const c = colorMap[type];

        const html = `
                <div id="${id}" class="toast-notification ${c.bg} text-white px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3 slide-in-right pointer-events-auto border border-white/20">
                    <i class="${c.icon} text-xl shrink-0"></i>
                    <div class="flex flex-col">
                        <span class="text-sm font-medium leading-tight">${msg}</span>
                        <span class="text-[10px] text-white/70 mt-0.5">${timeStr}</span>
                    </div>
                </div>
            `;
        container.insertAdjacentHTML("beforeend", html);

        setTimeout(() => {
          const el = document.getElementById(id);
          if (el) {
            el.classList.add("hide");
            setTimeout(() => el.remove(), 400);
          }
        }, 4000);
      }

      // --- RENDERIZADOR PRINCIPAL ---
      function render() {
        // Actualizar Botones Sidebar
        document.querySelectorAll(".nav-btn").forEach((btn) => {
          const isActive = btn.dataset.view === state.currentView;
          btn.className = `nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 font-medium ${isActive ? "bg-indigo-600 text-white shadow-lg shadow-indigo-500/30 translate-x-2" : "text-zinc-400 hover:bg-zinc-800 hover:text-white"}`;
        });

        // Actualizar Bottom Menu Móvil
        document.querySelectorAll(".bottom-nav-btn").forEach((btn) => {
          const isActive = btn.dataset.bottomView === state.currentView;
          const iconContainer = btn.querySelector(".icon-container");
          const textSpan = btn.querySelector("span");
          const icon = btn.querySelector("i");

          if (isActive) {
            btn.classList.add("text-indigo-600");
            btn.classList.remove("text-zinc-400");
            iconContainer.classList.add(
              "bg-indigo-100",
              "shadow-inner",
              "-translate-y-2",
            );
            icon.classList.add("animate-bounce-short");
            textSpan.classList.add(
              "font-bold",
              "opacity-100",
              "text-indigo-700",
            );
          } else {
            btn.classList.remove("text-indigo-600");
            btn.classList.add("text-zinc-400");
            iconContainer.classList.remove(
              "bg-indigo-100",
              "shadow-inner",
              "-translate-y-2",
            );
            icon.classList.remove("animate-bounce-short");
            textSpan.classList.remove(
              "font-bold",
              "opacity-100",
              "text-indigo-700",
            );
          }
        });

        // Ocultar todas las vistas
        [
          "view-admin",
          "view-waiter",
          "view-kitchen",
          "view-cashier",
          "view-sales",
        ].forEach((id) => {
          document.getElementById(id).classList.add("hidden");
        });

        // Mostrar activa
        const activeView = document.getElementById(`view-${state.currentView}`);
        if (activeView) activeView.classList.remove("hidden");

        // Renderizar contenido específico
        if (state.currentView === "admin") renderAdmin();
        if (state.currentView === "waiter") renderWaiter();
        if (state.currentView === "kitchen") renderKitchen();
        if (state.currentView === "cashier") renderCashier();
        if (state.currentView === "sales") renderSales();

        renderHeaderBadges();
      }

      // --- NAVEGACIÓN Y PANELES ---
      function changeView(view, tab = null) {
        state.currentView = view;
        if (tab) state.adminTab = tab;
        state.isMobileMenuOpen = false;
        document
          .getElementById("mobile-sidebar")
          .classList.add("-translate-x-full");
        document.getElementById("mobile-overlay").classList.add("hidden");
        render();
      }

      function toggleMobileMenu() {
        state.isMobileMenuOpen = !state.isMobileMenuOpen;
        const sidebar = document.getElementById("mobile-sidebar");
        const overlay = document.getElementById("mobile-overlay");
        if (state.isMobileMenuOpen) {
          sidebar.classList.remove("-translate-x-full");
          overlay.classList.remove("hidden");
        } else {
          sidebar.classList.add("-translate-x-full");
          overlay.classList.add("hidden");
        }
      }

      function toggleNotifPanel() {
        state.isNotifPanelOpen = !state.isNotifPanelOpen;
        const panel = document.getElementById("notif-panel");
        const overlay = document.getElementById("notif-overlay");
        if (state.isNotifPanelOpen) {
          panel.classList.remove("translate-x-full");
          overlay.classList.remove("hidden");
          renderNotificationPanel();
        } else {
          panel.classList.add("translate-x-full");
          overlay.classList.add("hidden");
        }
      }

      function renderHeaderBadges() {
        const bells = document.querySelectorAll(".notif-badge");
        const count = state.notifications.length;
        bells.forEach((b) => {
          b.innerHTML =
            count > 0
              ? `<span class="absolute 0 top-0 right-0 w-2.5 h-2.5 bg-red-500 border-2 border-zinc-900 rounded-full animate-pulse"></span>`
              : "";
        });
      }

    <script>
      // --- HELPERS & COMPONENTES UI ---
      const formatMoney = (amount) =>
        new Intl.NumberFormat("es-CO", {
          style: "currency",
          currency: "COP",
          maximumFractionDigits: 0,
        }).format(amount);

      const getTagBadgeHTML = (tag) => {
        if (!tag) return "";
        const isRec = tag === "Recomendado";
        return `<span class="text-[10px] sm:text-xs px-2.5 py-1 rounded-full font-bold border shadow-sm ${isRec ? "bg-amber-100 text-amber-700 border-amber-200" : "bg-purple-100 text-purple-700 border-purple-200"} flex items-center gap-1 w-fit"><i class="ph-fill ${isRec ? "ph-star" : "ph-sparkle"}"></i> ${tag}</span>`;
      };

      // Paginación 1 a 1 (+ / -) requerida por el usuario
      const getPaginationHTML = (stateObjPath, totalItems) => {
        // stateObjPath es un string como 'adminMenu'
        const pagState = state.pagination[stateObjPath];
        const totalPages = Math.ceil(totalItems / pagState.itemsPerPage) || 1;

        // Auto corregir si la página actual supera el máximo por borrado
        if (pagState.page > totalPages) pagState.page = totalPages;
        if (pagState.page < 1) pagState.page = 1;

        return `
                <div class="flex items-center justify-center gap-3 mt-6 p-2 bg-white rounded-2xl shadow-sm border border-zinc-200 w-fit mx-auto transition-all">
                    <button onclick="changePage('${stateObjPath}', -1)" ${pagState.page <= 1 ? "disabled" : ""} class="w-10 h-10 flex items-center justify-center rounded-xl bg-zinc-50 hover:bg-zinc-100 text-zinc-600 disabled:opacity-40 transition-colors active:scale-95 border border-zinc-200">
                        <i class="ph-bold ph-minus text-lg"></i>
                    </button>
                    <div class="flex flex-col items-center px-4 min-w-[80px]">
                        <span class="text-[10px] uppercase font-bold text-zinc-400 tracking-wider">Página</span>
                        <span class="font-extrabold text-zinc-800 text-lg leading-tight">${pagState.page} <span class="text-zinc-400 text-sm font-medium">/ ${totalPages}</span></span>
                    </div>

      // Lógica de Guardado Modales
      function saveTable() {
        const name = document.getElementById("m-table-name").value.trim();
        if (!name) return notify("Ingresa un nombre para la mesa", "warning");
        const id =
          state.tables.length > 0
            ? Math.max(...state.tables.map((t) => t.id)) + 1
            : 1;
        state.tables.push({
          id,
          name,
          x: 20,
          y: 20,
          status: "free",
          zone: state.adminZone,
        });
        closeModal();
        renderAdmin();
        notify(`Mesa '${name}' creada con éxito`, "success");
      }

      function saveMenu() {
        const name = document.getElementById("m-menu-name").value.trim();
        const price = parseInt(document.getElementById("m-menu-price").value);
        const cost =
          parseInt(document.getElementById("m-menu-cost").value) || 0;
        const category = document.getElementById("m-menu-cat").value;
        const tag = document.querySelector(
          'input[name="m-menu-tag"]:checked',
        ).value;

        if (!name || !price)
          return notify("Completa los campos obligatorios", "warning");

        const id =
          state.menu.length > 0
            ? Math.max(...state.menu.map((i) => i.id)) + 1
            : 1;
        state.menu.unshift({ id, name, price, cost, category, tag }); // Agregar al inicio
        closeModal();
        renderAdmin();
        notify(`Producto '${name}' guardado`, "success");
      }

      function executeDelete(type, id) {
        state[type] = state[type].filter((item) => item.id !== id);
        closeModal();
        renderAdmin();
        notify("Registro eliminado correctamente", "info");
      }

          totalService += o.serviceCharge || 0;
          if (o.paymentMethod === "efectivo") {
            // Only add the cash received for the specific order.
            // Assuming finalTotal already includes service charge if paid in cash.
            // And cashReceived - change = finalTotal
            cashInRegister += o.finalTotal;
          }
          totalProfit += o.profit || 0;
          totalItemsSold += o.items.reduce(
            (acc, item) => acc + item.quantity,
            0,

                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-zinc-200 flex flex-col justify-between h-full">

                        </div>
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border border-zinc-200 flex-1 flex flex-col overflow-hidden">

                                    <tr>
                                        <th class="p-4 text-xs font-bold text-zinc-500 uppercase tracking-wider">Ref / Hora</th>

                                </tbody>
                            </table>

                        <div class="p-4 border-t border-zinc-200 bg-zinc-50 shrink-0">

      function saveZone() {
        const name = document.getElementById("m-zone-name").value.trim();
        if (!name) return notify("Ingresa un nombre para la zona", "warning");
        if (state.zones.includes(name))
          return notify("Esta zona ya existe", "warning");

        state.zones.push(name);
        state.adminZone = name; // Switch to new zone
        closeModal();
        renderAdmin();
        notify(`Zona '${name}' creada con éxito`, "success");

      function toggleTableReservation(tableId) {
        const table = state.tables.find((t) => t.id === tableId);
        if (!table) return;

        if (table.status === "occupied") {
          return notify("No se puede reservar una mesa ocupada.", "warning");
        }

        table.status = table.status === "free" ? "reserved" : "free";
        renderAdmin();
        const action = table.status === "reserved" ? "reservada" : "liberada";
        notify(`Mesa '${table.name}' ${action}`, "info");
      }

      // --- Drag & Drop Core Mejorado ---
      let draggedTable = null;
      let isDragging = false;
      let startX, startY;

      function renderFloorPlan(containerId, isDraggable = false, zone = null) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = "";

        let displayTables = state.tables;
        if (zone) {
          displayTables = displayTables.filter((t) => t.zone === zone);
        }

        displayTables.forEach((table) => {
          const el = document.createElement("div");
          const isFree = table.status === "free";
          const isReserved = table.status === "reserved";

          let bgClass = "bg-white border-zinc-300 text-zinc-700"; // free
          let iconColor = "text-zinc-400";

          if (table.status === "occupied") {
            bgClass =
              "bg-emerald-50 border-emerald-400 text-emerald-800 shadow-emerald-500/20";
            iconColor = "text-emerald-500";
          } else if (isReserved) {
            bgClass =
              "bg-purple-50 border-purple-400 text-purple-800 shadow-purple-500/20";
            iconColor = "text-purple-500";
          }

          el.className = `table-item absolute w-20 h-20 sm:w-24 sm:h-24 rounded-3xl flex flex-col items-center justify-center shadow-lg border-2 select-none ${bgClass}`;
          el.style.left = `${table.x}px`;
          el.style.top = `${table.y}px`;

          let indicator = "";
          if (!isFree && !isDraggable) {
            const color =
              table.status === "occupied" ? "bg-emerald-500" : "bg-purple-500";
            indicator = `<div class="absolute -top-1.5 -right-1.5 ${color} w-4 h-4 rounded-full border-2 border-white shadow-sm animate-pulse"></div>`;
          }

          el.innerHTML = `
                    <i class="ph-fill ph-armchair text-2xl mb-1 ${iconColor}"></i>
                    <span class="font-extrabold text-xs sm:text-sm leading-tight text-center px-1 truncate w-full">${table.name}</span>
                    ${isReserved && isDraggable ? '<span class="text-[10px] font-bold text-purple-600 uppercase">Reserva</span>' : ""}
                    ${indicator}
                `;

          if (isDraggable) {
            el.style.cursor = "grab";

            // Doble clic / tap largo para reservar (o click en una zona sensible no cubierta por drag)
            // Para simplificar, agregamos un listener de click rápido vs drag
            let clickStartTime = 0;

            const handleStart = (e) => {
              if (e.target.tagName === "BUTTON") return; // ignorar botones dentro
              clickStartTime = Date.now();
              isDragging = false; // We don't know yet if it's a drag or click
              draggedTable = table;
              const clientX = e.type.includes("mouse")
                ? e.clientX
                : e.touches[0].clientX;
              const clientY = e.type.includes("mouse")
                ? e.clientY
                : e.touches[0].clientY;

              const rect = el.getBoundingClientRect();
              startX = clientX - rect.left;
              startY = clientY - rect.top;

              // Delay visual dragging slightly to allow clicks
              setTimeout(() => {
                if (
                  draggedTable === table &&
                  Date.now() - clickStartTime > 150
                ) {
                  isDragging = true;
                  el.classList.add("dragging");
                  document.body.style.userSelect = "none";
                }
              }, 150);
            };

            const handleClick = (e) => {
              if (Date.now() - clickStartTime < 200 && !isDragging) {
                toggleTableReservation(table.id);
              }
            };

            el.addEventListener("mousedown", handleStart);
            el.addEventListener("touchstart", handleStart, { passive: false });
            el.addEventListener("mouseup", handleClick);
            el.addEventListener("touchend", handleClick);
          } else {
            el.style.cursor = "pointer";
            el.onclick = () => selectWaiterTable(table.id);
          }

          container.appendChild(el);
        });

        if (isDraggable && !window.dndInitialized) {
          window.dndInitialized = true; // Solo bindear document events una vez

          const handleMove = (e) => {
            if (!isDragging || !draggedTable) return;
            e.preventDefault();

            const containerRect = document
              .getElementById("floor-plan-admin")
              .getBoundingClientRect();
            const clientX = e.type.includes("mouse")
              ? e.clientX
              : e.touches[0].clientX;
            const clientY = e.type.includes("mouse")
              ? e.clientY
              : e.touches[0].clientY;

            let newX = clientX - containerRect.left - startX;
            let newY = clientY - containerRect.top - startY;

            // Limites (asumiendo mesa max 96px width)
            newX = Math.max(0, Math.min(newX, containerRect.width - 96));
            newY = Math.max(0, Math.min(newY, containerRect.height - 96));

            draggedTable.x = newX;
            draggedTable.y = newY;

            // Actualización directa del DOM para fluidez
            const activeEl = document.querySelector(".table-item.dragging");
            if (activeEl) {
              activeEl.style.left = `${newX}px`;
              activeEl.style.top = `${newY}px`;
            }
          };

          const handleEnd = () => {
            if (isDragging) {
              isDragging = false;
              draggedTable = null;
              document.body.style.userSelect = "";
              document
                .querySelectorAll(".table-item")
                .forEach((el) => el.classList.remove("dragging"));
            }
          };

          document.addEventListener("mousemove", handleMove);
          document.addEventListener("touchmove", handleMove, {
            passive: false,
          });
          document.addEventListener("mouseup", handleEnd);
          document.addEventListener("touchend", handleEnd);
        }
      }

      // Lógica Mesero
      function setWaiterFilter(cat) {
        state.pagination.waiterMenu.filter = cat;
        state.pagination.waiterMenu.page = 1; // Reset page
        renderWaiter();
      }

      function selectWaiterTable(id) {
        state.selectedTableId = id;
        state.cart = [];
        state.pagination.waiterMenu.page = 1;
        renderWaiter();
      }

      function addToCart(productId) {
        const p = state.menu.find((x) => x.id === productId);
        const ex = state.cart.find((i) => i.productId === productId);
        if (ex) ex.quantity++;
        else
          state.cart.push({
            productId,
            name: p.name,
            price: p.price,
            quantity: 1,
          });

        // Efecto sutil sin recargar todo el HTML drásticamente (UX)
        notify(`Añadido: ${p.name}`, "info");
        renderWaiter();
      }

      function updateCartQty(productId, delta) {
        const item = state.cart.find((i) => i.productId === productId);
        if (item) {
          item.quantity += delta;
          if (item.quantity <= 0)
            state.cart = state.cart.filter((i) => i.productId !== productId);
        }
        renderWaiter();
      }

      function getCartTotal() {
        return state.cart.reduce((sum, i) => sum + i.price * i.quantity, 0);
      }

      function sendOrder() {
        if (state.cart.length === 0) return;

        const table = state.tables.find((t) => t.id === state.selectedTableId);
        const subtotal = getCartTotal();
        const tax = subtotal * 0.19;
        const total = subtotal + tax;

        const existingOrder = state.orders.find(
          (o) => o.tableId === table.id && o.status !== "paid",
        );

        if (existingOrder) {
          // Merge items para misma cuenta
          state.cart.forEach((cItem) => {
            const exItem = existingOrder.items.find(
              (i) => i.productId === cItem.productId,
            );
            if (exItem) exItem.quantity += cItem.quantity;
            else existingOrder.items.push({ ...cItem });
          });
          existingOrder.subtotal += subtotal;
          existingOrder.tax += tax;
          existingOrder.total += total;
          existingOrder.status = "pending";
        } else {
          state.orders.push({
            id: Date.now(),
            tableId: table.id,
            items: [...state.cart],
            status: "pending",
            subtotal,
            tax,
            total,
            time: new Date().toLocaleTimeString("es-CO", {
              hour: "2-digit",
              minute: "2-digit",
            }),
            ref: `TK-${Math.floor(Math.random() * 9000) + 1000}`,
          });
        }

        table.status = "occupied";
        state.cart = [];
        state.selectedTableId = null;
        state.isCartOpenOnMobile = false;

        notify(`Orden enviada a cocina (Mesa ${table.name})`, "success");
        renderWaiter();
      }

            return `
                    <div class="bg-zinc-800 rounded-3xl overflow-hidden border-2 flex flex-col shadow-2xl ${isPending ? "border-amber-500/50" : "border-indigo-500 animate-pulse-ring"}">
                        <div class="p-4 flex justify-between items-center ${isPending ? "bg-amber-500/10 border-b border-amber-500/20" : "bg-indigo-500/20 border-b border-indigo-500/30"}">
                            <h3 class="font-extrabold text-xl text-white">Mesa ${table ? table.name : "?"}</h3>
                            <div class="flex items-center gap-1.5 px-3 py-1 bg-zinc-900/50 rounded-lg text-sm font-bold shadow-inner">
                                <i class="ph-bold ph-clock ${isPending ? "text-amber-400" : "text-indigo-400"}"></i>
                                <span class="text-white">${order.time}</span>
                            </div>
                        </div>
                        
                        <div class="p-5 flex-1 bg-zinc-800/50">
                            <ul class="space-y-4">
                                ${order.items
                                  .map(
                                    (item) => `
                                    <li class="flex items-start gap-4">
                                        <span class="font-extrabold text-lg min-w-[2.5rem] h-10 flex items-center justify-center rounded-xl bg-zinc-700 text-white shadow-inner border border-zinc-600">${item.quantity}</span>
                                        <span class="text-zinc-200 font-bold text-lg leading-tight pt-1">${item.name}</span>
                                    </li>
                                `,
                                  )
                                  .join("")}
                            </ul>
                        </div>
                        
                        <div class="p-4 bg-zinc-900 border-t border-zinc-700">
                            ${
                              isPending
                                ? `
                                <button onclick="updateOrderStatus(${order.id}, 'cooking')" class="w-full py-4 bg-amber-500 hover:bg-amber-400 text-zinc-900 rounded-2xl font-extrabold text-lg transition-colors shadow-lg active:scale-95 flex justify-center items-center gap-2">
                                    <i class="ph-bold ph-fire"></i> Preparar
                                </button>
                            `
                                : `
                                <button onclick="updateOrderStatus(${order.id}, 'ready')" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-extrabold text-lg transition-colors shadow-lg shadow-indigo-500/30 active:scale-95 flex justify-center items-center gap-2">
                                    <i class="ph-bold ph-bell-ringing"></i> Despachar
                                </button>
                            `
                            }
                        </div>
                    </div>
                `;
          })
          .join("");
      }

      function updateOrderStatus(orderId, newStatus) {
        const order = state.orders.find((o) => o.id === orderId);
        if (order) {
          order.status = newStatus;
          if (newStatus === "ready") {
            const table = state.tables.find((t) => t.id === order.tableId);
            notify(`El pedido de la Mesa ${table.name} está LISTO`, "success");
          }
        }
        renderKitchen();
      }

      setInterval(() => {
        const el = document.getElementById("kitchen-clock");
        if (el)
          el.innerText = new Date().toLocaleTimeString("es-CO", {
            hour: "2-digit",
            minute: "2-digit",
          });
      }, 1000);

      // ==========================================
      // MÓDULO 4: VISTA CAJA
      // ==========================================
      function renderCashier() {
        const container = document.getElementById("cashier-tickets-container");
        const activeOrders = state.orders.filter((o) => o.status !== "paid");

        if (activeOrders.length === 0) {
          container.innerHTML = `
                    <div class="col-span-full py-20 flex flex-col items-center justify-center text-zinc-400">
                        <i class="ph-duotone ph-receipt text-7xl mb-4 text-zinc-300"></i>
                        <h3 class="text-xl font-bold text-zinc-500">Sin cuentas pendientes</h3>
                    </div>`;
          return;
        }

        container.innerHTML = activeOrders
          .map((order) => {
            const table = state.tables.find((t) => t.id === order.tableId);
            const isReady = order.status === "ready";

            return `
                    <div class="bg-white rounded-3xl shadow-sm border border-zinc-200 overflow-hidden flex flex-col hover:shadow-md transition-shadow">
                        <div class="bg-zinc-900 p-5 flex justify-between items-center text-white">
                            <div>
                                <h3 class="font-extrabold text-xl">Mesa ${table ? table.name : "?"}</h3>
                                <p class="text-xs text-zinc-400 font-mono mt-1">Ref: ${order.ref}</p>
                            </div>
                            <span class="text-xs px-3 py-1.5 rounded-full border font-bold flex items-center gap-1 ${isReady ? "bg-emerald-500/20 text-emerald-400 border-emerald-500/30" : "bg-zinc-700 text-zinc-300 border-zinc-600"}">
                                <i class="ph-fill ${isReady ? "ph-check-circle" : "ph-cooking-pot"}"></i> ${isReady ? "Servido" : "Proceso"}
                            </span>
                        </div>
                        
                        <div class="p-6 flex-1 bg-[radial-gradient(#f4f4f5_1px,transparent_1px)] [background-size:16px_16px]">
                            <div class="bg-white p-4 rounded-2xl border border-zinc-100 shadow-sm">
                                <div class="space-y-3 mb-4 border-b border-zinc-100 pb-4">
                                    ${order.items
                                      .map(
                                        (item) => `
                                        <div class="flex justify-between text-sm font-medium text-zinc-600">
                                            <span class="truncate pr-2">${item.quantity}x ${item.name}</span>
                                            <span class="shrink-0 text-zinc-800">${formatMoney(item.price * item.quantity)}</span>
                                        </div>
                                    `,
                                      )
                                      .join("")}
                                </div>
                                <div class="space-y-1.5 text-sm font-medium">
                                    <div class="flex justify-between text-zinc-500">
                                        <span>Subtotal</span><span>${formatMoney(order.subtotal)}</span>
                                    </div>
                                    <div class="flex justify-between text-zinc-500">
                                        <span>IVA (19%)</span><span>${formatMoney(order.tax)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="p-5 bg-white border-t border-zinc-200 shrink-0">
                            <div class="flex justify-between items-center mb-5 bg-zinc-50 p-4 rounded-2xl border border-zinc-100">
                                <span class="text-sm font-bold text-zinc-500 uppercase tracking-wider">Total</span>
                                <span class="text-3xl font-extrabold text-emerald-600">${formatMoney(order.total)}</span>
                            </div>
                            <button onclick="processPayment(${order.id}, ${table.id})" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-extrabold text-lg py-4 rounded-2xl transition-colors shadow-xl shadow-emerald-500/20 flex items-center justify-center gap-2 active:scale-95">
                                <i class="ph-bold ph-currency-dollar text-2xl"></i> Facturar y Liberar
                            </button>
                        </div>
                    </div>
                `;
          })
          .join("");
      }

      function processPayment(orderId, tableId) {
        const table = state.tables.find((t) => t.id === tableId);
        const order = state.orders.find((o) => o.id === orderId);

        // By default, service is 10% of subtotal
        const defaultServiceCharge = order.subtotal * 0.1;

        openModal(`
                <div class="p-5 border-b border-zinc-100 flex justify-between items-center bg-zinc-50">
                    <h3 class="font-bold text-lg text-zinc-800">Procesar Pago - Mesa ${table.name}</h3>
                    <button onclick="closeModal()" class="text-zinc-400 hover:text-zinc-600"><i class="ph ph-x text-xl"></i></button>
                </div>
                <div class="p-5 space-y-4 max-h-[80vh] overflow-y-auto">
                    <!-- Detalle de Productos -->
                    <div class="bg-white p-4 rounded-xl border border-zinc-200 shadow-sm max-h-48 overflow-y-auto">
                        <h4 class="text-xs font-bold text-zinc-500 uppercase tracking-wider mb-3">Detalle del Pedido</h4>
                        <div class="space-y-2">
                            ${order.items
                              .map(
                                (item) => `
                                <div class="flex justify-between text-sm">
                                    <span class="font-medium text-zinc-700"><span class="text-zinc-400 mr-1">${item.quantity}x</span>${item.name}</span>
                                    <span class="text-zinc-800">${formatMoney(item.price * item.quantity)}</span>
                                </div>
                            `,
                              )
                              .join("")}
                        </div>
                    </div>

                    <div class="bg-zinc-50 p-4 rounded-xl border border-zinc-200">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-sm font-medium text-zinc-600">Subtotal + IVA:</span>
                            <span class="font-bold text-zinc-800" id="payment-base-total" data-base="${order.total}">${formatMoney(order.total)}</span>
                        </div>

                        <div class="mt-3 p-3 bg-white rounded-lg border border-zinc-200">
                            <label class="block text-xs font-bold text-zinc-500 uppercase mb-2">Servicio Voluntario (Propina)</label>
                            <div class="flex items-center gap-2">
                                <span class="text-zinc-500 font-bold">$</span>
                                <input type="number" id="m-payment-service-input" class="w-full bg-zinc-50 border border-zinc-200 rounded-md px-3 py-1.5 text-sm font-bold text-indigo-600 outline-none focus:border-indigo-400" value="${defaultServiceCharge}" oninput="updatePaymentTotal(${order.total})">
                            </div>
                            <div class="text-[10px] text-zinc-400 mt-1 flex gap-2">
                                <button onclick="document.getElementById('m-payment-service-input').value=${defaultServiceCharge}; updatePaymentTotal(${order.total})" class="hover:text-indigo-500">10% Sugerido</button>
                                <button onclick="document.getElementById('m-payment-service-input').value=0; updatePaymentTotal(${order.total})" class="hover:text-indigo-500">Sin Servicio</button>
                            </div>
                        </div>

                        <div class="flex justify-between items-center mt-3 pt-3 border-t border-zinc-200">
                            <span class="text-base font-bold text-zinc-800">Total a Pagar:</span>
                            <span class="text-xl font-extrabold text-emerald-600" id="payment-final-total">${formatMoney(order.total + defaultServiceCharge)}</span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-zinc-500 uppercase mb-1">Método de Pago</label>
                        <select id="m-payment-method" class="input-pro cursor-pointer" onchange="toggleCashInput()">
                            <option value="efectivo">Efectivo</option>
                            <option value="tarjeta">Tarjeta (Crédito/Débito)</option>
                            <option value="transferencia">Transferencia</option>
                        </select>
                    </div>

                    <div id="cash-input-container" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-zinc-500 uppercase mb-1">Efectivo Recibido</label>
                            <input type="number" id="m-payment-cash" class="input-pro text-lg font-bold text-zinc-800" placeholder="Ej: 100000" oninput="calculateChange()">
                        </div>
                        <div class="bg-indigo-50 p-3 rounded-xl border border-indigo-100 flex justify-between items-center hidden" id="change-container">
                            <span class="text-sm font-bold text-indigo-800 uppercase tracking-wider">Cambio a devolver:</span>
                            <span class="text-xl font-extrabold text-indigo-600" id="payment-change">$0</span>
                        </div>
                    </div>

                    <button onclick="confirmPayment(${orderId}, ${tableId})" class="w-full mt-2 py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-extrabold rounded-xl shadow-lg shadow-emerald-500/30 transition-colors flex items-center justify-center gap-2">
                        <i class="ph-bold ph-check-circle text-xl"></i> Confirmar Pago
                    </button>
                </div>
            `);
        setTimeout(() => {
          document.getElementById("m-payment-cash").focus();
        }, 100);

        // Set initial total value
        window.currentPaymentTotal = order.total + defaultServiceCharge;
        window.currentServiceChargeAmount = defaultServiceCharge;
      }

      function updatePaymentTotal(baseTotal) {
        const inputVal = document.getElementById(
          "m-payment-service-input",
        ).value;
        const serviceAmount = parseInt(inputVal) || 0;

        window.currentPaymentTotal = baseTotal + serviceAmount;
        window.currentServiceChargeAmount = serviceAmount;

        document.getElementById("payment-final-total").innerText = formatMoney(
          window.currentPaymentTotal,
        );
        calculateChange();
      }

      function toggleCashInput() {
        const method = document.getElementById("m-payment-method").value;
        const container = document.getElementById("cash-input-container");
        if (method === "efectivo") {
          container.classList.remove("hidden");
          setTimeout(
            () => document.getElementById("m-payment-cash").focus(),
            50,
          );
        } else {
          container.classList.add("hidden");
        }
      }

      function calculateChange() {
        const method = document.getElementById("m-payment-method").value;
        if (method !== "efectivo") return;

        const cashReceived =
          parseInt(document.getElementById("m-payment-cash").value) || 0;
        const changeContainer = document.getElementById("change-container");
        const changeDisplay = document.getElementById("payment-change");

        const change = cashReceived - window.currentPaymentTotal;

        if (cashReceived > 0 && change >= 0) {
          changeContainer.classList.remove("hidden");
          changeDisplay.innerText = formatMoney(change);
          changeContainer.classList.remove("bg-red-50", "border-red-100");
          changeContainer.classList.add("bg-indigo-50", "border-indigo-100");
          changeDisplay.classList.remove("text-red-600");
          changeDisplay.classList.add("text-indigo-600");
        } else if (cashReceived > 0 && change < 0) {
          changeContainer.classList.remove("hidden");
          changeDisplay.innerText = "Falta " + formatMoney(Math.abs(change));
          changeContainer.classList.remove("bg-indigo-50", "border-indigo-100");
          changeContainer.classList.add("bg-red-50", "border-red-100");
          changeDisplay.classList.remove("text-indigo-600");
          changeDisplay.classList.add("text-red-600");
        } else {
          changeContainer.classList.add("hidden");
        }
      }

      function confirmPayment(orderId, tableId) {
        const order = state.orders.find((o) => o.id === orderId);
        const method = document.getElementById("m-payment-method").value;

        let cashReceived = 0;
        let change = 0;

        if (method === "efectivo") {
          cashReceived =
            parseInt(document.getElementById("m-payment-cash").value) || 0;
          if (cashReceived < window.currentPaymentTotal) {
            return notify(
              "El efectivo recibido es menor al total a pagar",
              "error",
            );
          }
          change = cashReceived - window.currentPaymentTotal;
        }

        if (order) {
          order.status = "paid";
          order.paymentMethod = method;
          order.serviceCharge = window.currentServiceChargeAmount;
          order.finalTotal = window.currentPaymentTotal;
          order.cashReceived =
            method === "efectivo" ? cashReceived : window.currentPaymentTotal;
          order.change = change;

          // Calculate total cost of items
          let totalCost = 0;
          order.items.forEach((item) => {
            const menuItem = state.menu.find((m) => m.id === item.productId);
            if (menuItem) {
              totalCost += (menuItem.cost || 0) * item.quantity;
            }
          });
          order.totalCost = totalCost;
          // Calculate profit: Total Sold (excluding tax/service, assuming prices have margin) - Cost
          order.profit = order.subtotal - totalCost;
        }

        const table = state.tables.find((t) => t.id === tableId);
        if (table) table.status = "free";

        closeModal();

        let msg = `Pago procesado (${method}).`;
        if (method === "efectivo" && change > 0) {
          msg += ` Cambio: ${formatMoney(change)}`;
        }

        notify(msg, "success");
        renderCashier();
      }

      // --- INICIALIZACIÓN ---
      window.onload = () => {
        render();
        // Mensaje bienvenida simulando sistema
        setTimeout(
          () => notify("Sistema RestoPro iniciado y sincronizado.", "info"),
          1000,
        );
      };
    </script>

    <!-- === BOTTOM MENU MÓVIL === -->
    <div
      class="md:hidden fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-zinc-200 shadow-[0_-10px_20px_-5px_rgba(0,0,0,0.05)] z-[60] flex justify-around items-center px-2 py-2 pb-[env(safe-area-inset-bottom,0.5rem)]"
    >
      <button
        onclick="changeView('waiter')"
        data-bottom-view="waiter"
        class="bottom-nav-btn flex flex-col items-center justify-center p-2 w-16 transition-all duration-300 relative text-zinc-400 group"
      >
        <div
          class="icon-container relative flex items-center justify-center w-10 h-10 rounded-full transition-all duration-300 group-hover:bg-indigo-50"
        >
          <i
            class="ph-fill ph-note-pencil text-2xl transition-transform duration-300 group-active:scale-90"
          ></i>
        </div>
        <span
          class="text-[10px] font-semibold transition-all duration-300 opacity-80 mt-0.5"
          >Pedido</span
        >
      </button>
      <button
        onclick="changeView('kitchen')"
        data-bottom-view="kitchen"
        class="bottom-nav-btn flex flex-col items-center justify-center p-2 w-16 transition-all duration-300 relative text-zinc-400 group"
      >
        <div
          class="icon-container relative flex items-center justify-center w-10 h-10 rounded-full transition-all duration-300 group-hover:bg-indigo-50"
        >
          <i
            class="ph-fill ph-cooking-pot text-2xl transition-transform duration-300 group-active:scale-90"
          ></i>
        </div>
        <span
          class="text-[10px] font-semibold transition-all duration-300 opacity-80 mt-0.5"
          >Cocina</span
        >
      </button>
      <button
        onclick="changeView('cashier')"
        data-bottom-view="cashier"
        class="bottom-nav-btn flex flex-col items-center justify-center p-2 w-16 transition-all duration-300 relative text-zinc-400 group"
      >
        <div
          class="icon-container relative flex items-center justify-center w-10 h-10 rounded-full transition-all duration-300 group-hover:bg-indigo-50"
        >
          <i
            class="ph-fill ph-cash-register text-2xl transition-transform duration-300 group-active:scale-90"
          ></i>
        </div>
        <span
          class="text-[10px] font-semibold transition-all duration-300 opacity-80 mt-0.5"
          >Caja</span
        >
      </button>
      <button
        onclick="changeView('sales')"
        data-bottom-view="sales"
        class="bottom-nav-btn flex flex-col items-center justify-center p-2 w-16 transition-all duration-300 relative text-zinc-400 group"
      >
        <div
          class="icon-container relative flex items-center justify-center w-10 h-10 rounded-full transition-all duration-300 group-hover:bg-indigo-50"
        >
          <i
            class="ph-fill ph-chart-line-up text-2xl transition-transform duration-300 group-active:scale-90"
          ></i>
        </div>
        <span
          class="text-[10px] font-semibold transition-all duration-300 opacity-80 mt-0.5"
          >Ventas</span
        >
      </button>
      <button
        onclick="changeView('admin', 'menu')"
        data-bottom-view="admin"
        class="bottom-nav-btn flex flex-col items-center justify-center p-2 w-16 transition-all duration-300 relative text-zinc-400 group"
      >
        <div
          class="icon-container relative flex items-center justify-center w-10 h-10 rounded-full transition-all duration-300 group-hover:bg-indigo-50"
        >
          <i
            class="ph-fill ph-gear text-2xl transition-transform duration-300 group-active:scale-90"
          ></i>
        </div>
        <span
          class="text-[10px] font-semibold transition-all duration-300 opacity-80 mt-0.5"
          >Admin</span
        >
      </button>
    </div>
  </body>
</html>
