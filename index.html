<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RestoPro - Sistema Integral de Restaurante</title>
    <!-- Tailwind CSS para diseño profesional -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overscroll-behavior-y: none; }
        
        /* Utilidades Ocultar Scrollbar */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animaciones */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .slide-in-right { animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        
        @keyframes pulse-ring { 
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } 
        }
        .animate-pulse-ring { animation: pulse-ring 2s infinite; }

        /* Estilos Drag and Drop Plano */
        .table-item { transition: transform 0.1s, box-shadow 0.2s; touch-action: none; user-select: none; }
        .table-item:active { transform: scale(1.05); cursor: grabbing !important; }
        .table-item.dragging { opacity: 0.9; z-index: 50; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        
        /* Grilla Fondo */
        .floor-grid {
            background-color: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Tostadas Temporales */
        .toast-notification { transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .toast-notification.hide { opacity: 0; transform: translateX(120%); }

        /* Estilos Formularios */
        .input-pro { w-full; padding: 0.75rem 1rem; border-radius: 0.75rem; border: 1px solid #e2e8f0; background-color: #f8fafc; transition: all 0.2s; outline: none; }
        .input-pro:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); background-color: #ffffff; }
    </style>
</head>
<body class="h-screen w-full flex flex-col md:flex-row overflow-hidden text-slate-800">

    <!-- ESTADO GLOBAL -->
    <script>
        const state = {
            currentView: 'waiter', // admin, waiter, kitchen, cashier
            adminTab: 'sales',      // tables, menu, inventory, staff
            
            // Datos Estructurales Mejorados
            tables: [
                { id: 1, name: 'M1', x: 40, y: 40, status: 'free' },
                { id: 2, name: 'M2', x: 160, y: 40, status: 'free' },
                { id: 3, name: 'Terraza 1', x: 40, y: 160, status: 'free' }
            ],
            menu: [
                { id: 1, name: 'Ceviche Mixto', price: 28000, cost: 15000, category: 'Entradas', tag: 'Sugerido' },
                { id: 2, name: 'Churrasco 300g', price: 45000, cost: 25000, category: 'Almuerzos', tag: 'Recomendado' },
                { id: 3, name: 'Salmón a la Plancha', price: 42000, cost: 20000, category: 'Almuerzos', tag: '' },
                { id: 4, name: 'Limonada Cereza', price: 9000, cost: 3000, category: 'Bebidas', tag: 'Recomendado' },
                { id: 5, name: 'Volcán de Chocolate', price: 15000, cost: 5000, category: 'Postres', tag: 'Sugerido' },
                { id: 6, name: 'Empanadas (x3)', price: 12000, cost: 5000, category: 'Entradas', tag: '' },
                { id: 7, name: 'Jugo Natural', price: 7000, cost: 2500, category: 'Bebidas', tag: '' }
            ],
            categories: ['Entradas', 'Almuerzos', 'Bebidas', 'Postres', 'Licores'],
            inventory: [
                { id: 1, name: 'Carne de Res', quantity: 50, unit: 'kg' },
                { id: 2, name: 'Salmón Fresco', quantity: 20, unit: 'filetes' }
            ],
            staff: [
                { id: 1, name: 'Juan Pérez', role: 'Mesero' },
                { id: 2, name: 'María Gómez', role: 'Capitán' }
            ],
            orders: [], // Comandas
            notifications: [], // { id, msg, type, time }
            
            // Estado UI y Paginación (Modulos 1 a 1)
            selectedTableId: null,
            cart: [],
            isMobileMenuOpen: false,
            isCartOpenOnMobile: false,
            isNotifPanelOpen: false,
            
            // Paginaciones separadas por módulo
            pagination: {
                waiterMenu: { page: 1, itemsPerPage: 6, filter: 'Todas' },
                adminMenu: { page: 1, itemsPerPage: 5 },
                adminInventory: { page: 1, itemsPerPage: 5 },
                adminStaff: { page: 1, itemsPerPage: 5 },
                adminSales: { page: 1, itemsPerPage: 5 }
            }
        };

        // --- SISTEMA DE NOTIFICACIONES (Historial + Toast) ---
        function notify(msg, type = 'success') {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            // Guardar en historial
            state.notifications.unshift({ id: Date.now(), msg, type, time: timeStr });
            if(state.notifications.length > 50) state.notifications.pop(); // Limite
            
            // Actualizar vista si el panel está abierto o el badge de campana
            renderHeaderBadges();
            if(state.isNotifPanelOpen) renderNotificationPanel();

            // Mostrar Toast temporal
            const container = document.getElementById('toast-container');
            const id = 'toast-' + Date.now();
            
            const colorMap = {
                'success': { bg: 'bg-emerald-500', icon: 'ph-check-circle' },
                'warning': { bg: 'bg-amber-500', icon: 'ph-warning' },
                'info': { bg: 'bg-blue-500', icon: 'ph-info' },
                'error': { bg: 'bg-red-500', icon: 'ph-x-circle' }
            };
            const c = colorMap[type];
            
            const html = `
                <div id="${id}" class="toast-notification ${c.bg} text-white px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3 slide-in-right pointer-events-auto border border-white/20">
                    <i class="${c.icon} text-xl shrink-0"></i>
                    <div class="flex flex-col">
                        <span class="text-sm font-medium leading-tight">${msg}</span>
                        <span class="text-[10px] text-white/70 mt-0.5">${timeStr}</span>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
            
            setTimeout(() => {
                const el = document.getElementById(id);
                if (el) {
                    el.classList.add('hide');
                    setTimeout(() => el.remove(), 400);
                }
            }, 4000);
        }

        // --- RENDERIZADOR PRINCIPAL ---
        function render() {
            // Actualizar Botones Sidebar
            document.querySelectorAll('.nav-btn').forEach(btn => {
                const isActive = btn.dataset.view === state.currentView;
                btn.className = `nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium ${isActive ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`;
            });

            // Ocultar todas las vistas
            ['view-admin', 'view-waiter', 'view-kitchen', 'view-cashier'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });

            // Mostrar activa
            const activeView = document.getElementById(`view-${state.currentView}`);
            if (activeView) activeView.classList.remove('hidden');

            // Renderizar contenido específico
            if (state.currentView === 'admin') renderAdmin();
            if (state.currentView === 'waiter') renderWaiter();
            if (state.currentView === 'kitchen') renderKitchen();
            if (state.currentView === 'cashier') renderCashier();
            
            renderHeaderBadges();
        }

        // --- NAVEGACIÓN Y PANELES ---
        function changeView(view, tab = null) {
            state.currentView = view;
            if (tab) state.adminTab = tab;
            state.isMobileMenuOpen = false;
            document.getElementById('mobile-sidebar').classList.add('-translate-x-full');
            document.getElementById('mobile-overlay').classList.add('hidden');
            render();
        }

        function toggleMobileMenu() {
            state.isMobileMenuOpen = !state.isMobileMenuOpen;
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('mobile-overlay');
            if (state.isMobileMenuOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function toggleNotifPanel() {
            state.isNotifPanelOpen = !state.isNotifPanelOpen;
            const panel = document.getElementById('notif-panel');
            const overlay = document.getElementById('notif-overlay');
            if (state.isNotifPanelOpen) {
                panel.classList.remove('translate-x-full');
                overlay.classList.remove('hidden');
                renderNotificationPanel();
            } else {
                panel.classList.add('translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function renderHeaderBadges() {
            const bells = document.querySelectorAll('.notif-badge');
            const count = state.notifications.length;
            bells.forEach(b => {
                b.innerHTML = count > 0 ? `<span class="absolute 0 top-0 right-0 w-2.5 h-2.5 bg-red-500 border-2 border-slate-900 rounded-full animate-pulse"></span>` : '';
            });
        }
    </script>

    <!-- === CONTENEDORES FLOTANTES === -->
    <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>
    <div id="modal-root" class="fixed inset-0 z-[150] hidden items-center justify-center bg-slate-900/60 backdrop-blur-sm px-4"></div>

    <!-- === PANEL LATERAL DE NOTIFICACIONES === -->
    <div id="notif-overlay" onclick="toggleNotifPanel()" class="hidden fixed inset-0 bg-slate-900/40 z-[90] backdrop-blur-sm transition-opacity"></div>
    <div id="notif-panel" class="fixed top-0 right-0 h-full w-full sm:w-96 bg-white shadow-2xl z-[95] transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <h3 class="font-bold text-lg text-slate-800 flex items-center gap-2">
                <i class="ph-fill ph-bell-ringing text-blue-500 text-xl"></i> Registro de Actividad
            </h3>
            <button onclick="toggleNotifPanel()" class="p-2 bg-white rounded-full hover:bg-slate-200 text-slate-500 shadow-sm transition-colors">
                <i class="ph ph-x"></i>
            </button>
        </div>
        <div id="notif-list" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50">
            <!-- Renderizado por JS -->
        </div>
    </div>

    <!-- === HEADER MÓVIL === -->
    <div class="md:hidden flex items-center justify-between bg-slate-900 text-white p-4 shadow-lg z-30 w-full shrink-0 relative">
        <div class="flex items-center gap-3">
            <button onclick="toggleMobileMenu()" class="p-2 bg-slate-800 rounded-lg active:bg-slate-700 transition">
                <i class="ph ph-list text-2xl"></i>
            </button>
            <h1 class="text-xl font-black flex items-center gap-2 tracking-tight">
                <i class="ph-fill ph-chef-hat text-blue-500 text-2xl"></i> RestoPro
            </h1>
        </div>
        <button onclick="toggleNotifPanel()" class="p-2 text-slate-300 hover:text-white relative">
            <i class="ph ph-bell text-2xl"></i>
            <div class="notif-badge"></div>
        </button>
    </div>

    <!-- === SIDEBAR PRINCIPAL === -->
    <div id="mobile-overlay" class="hidden md:hidden fixed inset-0 bg-slate-900/60 z-30 backdrop-blur-sm" onclick="toggleMobileMenu()"></div>
    
    <div id="mobile-sidebar" class="
        fixed inset-y-0 left-0 transform -translate-x-full
        md:relative md:translate-x-0 transition-transform duration-300 ease-in-out z-40
        w-72 bg-slate-900 text-slate-300 flex flex-col flex-shrink-0 shadow-2xl border-r border-slate-800
    ">
        <div class="p-6 border-b border-slate-800 hidden md:flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-black text-white flex items-center gap-2 tracking-tight">
                    <i class="ph-fill ph-chef-hat text-blue-500"></i> RestoPro
                </h1>
                <p class="text-xs text-slate-500 mt-1 font-medium">Sistema Premium v3.0</p>
            </div>
            <button onclick="toggleNotifPanel()" class="p-2 text-slate-400 hover:text-white relative hover:bg-slate-800 rounded-lg transition-colors">
                <i class="ph-fill ph-bell text-xl"></i>
                <div class="notif-badge"></div>
            </button>
        </div>

        <div class="p-4 flex-1 flex flex-col gap-2 overflow-y-auto mt-16 md:mt-0 hide-scrollbar">
            <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 mt-2 px-2">Punto de Venta</div>
            <button onclick="changeView('waiter')" data-view="waiter" class="nav-btn">
                <i class="ph-fill ph-note-pencil text-xl"></i> Toma de Pedidos
            </button>
            <button onclick="changeView('kitchen')" data-view="kitchen" class="nav-btn">
                <i class="ph-fill ph-cooking-pot text-xl"></i> Monitor Cocina (KDS)
            </button>
            <button onclick="changeView('cashier')" data-view="cashier" class="nav-btn">
                <i class="ph-fill ph-cash-register text-xl"></i> Caja y Pagos
            </button>

            <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 mt-6 px-2">Gestión y Ajustes</div>
            <button onclick="changeView('admin', 'menu')" data-view="admin" class="nav-btn">
                <i class="ph-fill ph-gear text-xl"></i> Administración
            </button>
        </div>
        
        <div class="p-5 border-t border-slate-800 flex justify-between items-center bg-slate-950/50 mt-auto">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-sm">A</div>
                <div class="flex flex-col">
                    <span class="text-sm font-semibold text-white">Admin Central</span>
                    <span class="text-[10px] text-emerald-400 flex items-center gap-1"><div class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div> En línea</span>
                </div>
            </div>
        </div>
    </div>

    <!-- === CONTENEDOR VISTAS === -->
    <div class="flex-1 overflow-hidden relative flex flex-col w-full bg-slate-50">
        
        <!-- VISTA: ADMINISTRACIÓN -->
        <div id="view-admin" class="hidden h-full flex flex-col">
            <div class="bg-white border-b border-slate-200 px-4 py-3 flex gap-2 overflow-x-auto hide-scrollbar shrink-0 shadow-sm z-10">
                <button onclick="changeAdminTab('sales')" id="tab-btn-sales" class="admin-tab-btn px-5 py-2.5 rounded-xl text-sm font-semibold transition-all">Ventas del Día</button>
                <button onclick="changeAdminTab('menu')" id="tab-btn-menu" class="admin-tab-btn px-5 py-2.5 rounded-xl text-sm font-semibold transition-all">Menú y Platos</button>
                <button onclick="changeAdminTab('tables')" id="tab-btn-tables" class="admin-tab-btn px-5 py-2.5 rounded-xl text-sm font-semibold transition-all">Plano de Mesas</button>
                <button onclick="changeAdminTab('inventory')" id="tab-btn-inventory" class="admin-tab-btn px-5 py-2.5 rounded-xl text-sm font-semibold transition-all">Inventario</button>
                <button onclick="changeAdminTab('staff')" id="tab-btn-staff" class="admin-tab-btn px-5 py-2.5 rounded-xl text-sm font-semibold transition-all">Personal</button>
            </div>
            <div class="flex-1 overflow-hidden relative bg-slate-50/50" id="admin-content-area"></div>
        </div>

        <!-- VISTA: MESERO -->
        <div id="view-waiter" class="hidden h-full flex flex-col w-full"></div>

        <!-- VISTA: COCINA -->
        <div id="view-kitchen" class="hidden h-full flex flex-col bg-[#0f172a] p-4 sm:p-6 overflow-y-auto">
             <div class="flex justify-between items-center mb-6">
                 <h2 class="text-2xl sm:text-3xl font-black flex items-center gap-3 text-white tracking-tight">
                    <div class="p-2.5 bg-amber-500/20 rounded-xl text-amber-500"><i class="ph-fill ph-cooking-pot"></i></div> Monitor KDS
                 </h2>
                 <div class="text-slate-400 text-sm font-medium flex items-center gap-2">
                     <i class="ph ph-clock"></i> <span id="kitchen-clock">--:--</span>
                 </div>
             </div>
            <div id="kitchen-tickets-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 pb-20"></div>
        </div>

        <!-- VISTA: CAJA -->
        <div id="view-cashier" class="hidden h-full flex flex-col p-4 sm:p-6 overflow-y-auto">
            <h2 class="text-2xl sm:text-3xl font-black text-slate-800 mb-6 flex items-center gap-3 tracking-tight">
                <div class="bg-emerald-100 p-2.5 rounded-xl text-emerald-600"><i class="ph-fill ph-cash-register"></i></div> Punto de Cobro
            </h2>
            <div id="cashier-tickets-container" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6 pb-20"></div>
        </div>

    </div>

    <!-- ========================================== -->
    <!-- LOGICA JAVASCRIPT PRINCIPAL                -->
    <!-- ========================================== -->
    <script>
        // --- HELPERS & COMPONENTES UI ---
        const formatMoney = (amount) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(amount);
        
        const getTagBadgeHTML = (tag) => {
            if (!tag) return '';
            const isRec = tag === 'Recomendado';
            return `<span class="text-[10px] sm:text-xs px-2.5 py-1 rounded-full font-bold border shadow-sm ${isRec ? 'bg-amber-100 text-amber-700 border-amber-200' : 'bg-purple-100 text-purple-700 border-purple-200'} flex items-center gap-1 w-fit"><i class="ph-fill ${isRec ? 'ph-star' : 'ph-sparkle'}"></i> ${tag}</span>`;
        };

        // Paginación 1 a 1 (+ / -) requerida por el usuario
        const getPaginationHTML = (stateObjPath, totalItems) => {
            // stateObjPath es un string como 'adminMenu'
            const pagState = state.pagination[stateObjPath];
            const totalPages = Math.ceil(totalItems / pagState.itemsPerPage) || 1;
            
            // Auto corregir si la página actual supera el máximo por borrado
            if (pagState.page > totalPages) pagState.page = totalPages;
            if (pagState.page < 1) pagState.page = 1;

            return `
                <div class="flex items-center justify-center gap-3 mt-6 p-2 bg-white rounded-2xl shadow-sm border border-slate-200 w-fit mx-auto transition-all">
                    <button onclick="changePage('${stateObjPath}', -1)" ${pagState.page <= 1 ? 'disabled' : ''} class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 hover:bg-slate-100 text-slate-600 disabled:opacity-40 transition-colors active:scale-95 border border-slate-200">
                        <i class="ph-bold ph-minus text-lg"></i>
                    </button>
                    <div class="flex flex-col items-center px-4 min-w-[80px]">
                        <span class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Página</span>
                        <span class="font-black text-slate-800 text-lg leading-tight">${pagState.page} <span class="text-slate-400 text-sm font-medium">/ ${totalPages}</span></span>
                    </div>
                    <button onclick="changePage('${stateObjPath}', 1)" ${pagState.page >= totalPages ? 'disabled' : ''} class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 hover:bg-slate-100 text-slate-600 disabled:opacity-40 transition-colors active:scale-95 border border-slate-200">
                        <i class="ph-bold ph-plus text-lg"></i>
                    </button>
                </div>
            `;
        };

        function changePage(module, delta) {
            state.pagination[module].page += delta;
            render(); // Rerenderiza la vista actual
        }

        function renderNotificationPanel() {
            const container = document.getElementById('notif-list');
            if (state.notifications.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-400 flex flex-col items-center"><i class="ph ph-bell-slash text-4xl mb-2 opacity-50"></i><p class="text-sm">No hay notificaciones recientes</p></div>`;
                return;
            }

            container.innerHTML = state.notifications.map(n => {
                const colors = {
                    'success': 'bg-emerald-100 text-emerald-600 border-emerald-200',
                    'warning': 'bg-amber-100 text-amber-600 border-amber-200',
                    'info': 'bg-blue-100 text-blue-600 border-blue-200',
                    'error': 'bg-red-100 text-red-600 border-red-200'
                }[n.type];
                
                const icon = {
                    'success': 'ph-check-circle', 'warning': 'ph-warning', 'info': 'ph-info', 'error': 'ph-x-circle'
                }[n.type];

                return `
                    <div class="p-3 bg-white border border-slate-100 rounded-xl shadow-sm flex items-start gap-3 animate-fade-in">
                        <div class="p-2 rounded-lg ${colors} shrink-0"><i class="ph-fill ${icon} text-lg"></i></div>
                        <div class="flex flex-col flex-1">
                            <span class="text-sm font-medium text-slate-800 leading-tight">${n.msg}</span>
                            <span class="text-[10px] font-bold text-slate-400 mt-1">${n.time}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ==========================================
        // SISTEMA DE MODALES (Reemplazo de Prompts)
        // ==========================================
        function openModal(htmlContent) {
            const root = document.getElementById('modal-root');
            root.innerHTML = `
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all animate-fade-in">
                    ${htmlContent}
                </div>
            `;
            root.classList.remove('hidden');
            root.classList.add('flex');
        }

        function closeModal() {
            const root = document.getElementById('modal-root');
            root.classList.add('hidden');
            root.classList.remove('flex');
            root.innerHTML = '';
        }

        // Formularios de Modales
        function modalAddTable() {
            openModal(`
                <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <h3 class="font-bold text-lg text-slate-800">Agregar Nueva Mesa</h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="ph ph-x text-xl"></i></button>
                </div>
                <div class="p-5 space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Nombre o Número</label>
                        <input type="text" id="m-table-name" class="input-pro" placeholder="Ej: Mesa 4, VIP 1..." autocomplete="off">
                    </div>
                    <button onclick="saveTable()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-md transition-colors">Crear Mesa</button>
                </div>
            `);
            setTimeout(() => document.getElementById('m-table-name').focus(), 50);
        }

        function modalAddMenu() {
            const cats = state.categories.map(c => `<option value="${c}">${c}</option>`).join('');

        // --- Drag & Drop Core Mejorado ---
        let draggedTable = null;
        let isDragging = false;
        let startX, startY;

        function renderFloorPlan(containerId, isDraggable = false) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            
            state.tables.forEach(table => {
                const el = document.createElement('div');
                const isFree = table.status === 'free';
                
                const bgClass = isFree ? 'bg-white border-slate-300 text-slate-700' : 'bg-emerald-50 border-emerald-400 text-emerald-800 shadow-emerald-500/20';
                
                el.className = `table-item absolute w-20 h-20 sm:w-24 sm:h-24 rounded-3xl flex flex-col items-center justify-center shadow-lg border-2 select-none ${bgClass}`;
                el.style.left = `${table.x}px`;
                el.style.top = `${table.y}px`;
                el.innerHTML = `
                    <i class="ph-fill ph-armchair text-2xl mb-1 ${isFree ? 'text-slate-400' : 'text-emerald-500'}"></i>
                    <span class="font-black text-xs sm:text-sm leading-tight text-center px-1 truncate w-full">${table.name}</span>
                    ${!isFree && !isDraggable ? '<div class="absolute -top-1.5 -right-1.5 bg-emerald-500 w-4 h-4 rounded-full border-2 border-white shadow-sm animate-pulse"></div>' : ''}
                `;

                if (isDraggable) {
                    el.style.cursor = 'grab';
                    
                    const handleStart = (e) => {
                        if(e.target.tagName === 'BUTTON') return; // ignorar botones dentro
                        isDragging = true;
                        draggedTable = table;
                        const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                        const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                        
                        const rect = el.getBoundingClientRect();
                        startX = clientX - rect.left;
                        startY = clientY - rect.top;
                        
                        el.classList.add('dragging');
                        document.body.style.userSelect = 'none'; // Prevenir selección global
                    };

                    el.addEventListener('mousedown', handleStart);
                    el.addEventListener('touchstart', handleStart, {passive: false});
                } else {
                    el.style.cursor = 'pointer';
                    el.onclick = () => selectWaiterTable(table.id);
                }

                container.appendChild(el);
            });

            if (isDraggable && !window.dndInitialized) {
                window.dndInitialized = true; // Solo bindear document events una vez
                
                const handleMove = (e) => {
                    if (!isDragging || !draggedTable) return;
                    e.preventDefault();
                    
                    const containerRect = document.getElementById('floor-plan-admin').getBoundingClientRect();
                    const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                    const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                    
                    let newX = clientX - containerRect.left - startX;
                    let newY = clientY - containerRect.top - startY;
                    
                    // Limites (asumiendo mesa max 96px width)
                    newX = Math.max(0, Math.min(newX, containerRect.width - 96)); 
                    newY = Math.max(0, Math.min(newY, containerRect.height - 96));
                    
                    draggedTable.x = newX;
                    draggedTable.y = newY;
                    
                    // Actualización directa del DOM para fluidez
                    const activeEl = document.querySelector('.table-item.dragging');
                    if(activeEl) {
                        activeEl.style.left = `${newX}px`;
                        activeEl.style.top = `${newY}px`;
                    }
                };

                const handleEnd = () => {
                    if (isDragging) {
                        isDragging = false;
                        draggedTable = null;
                        document.body.style.userSelect = '';
                        document.querySelectorAll('.table-item').forEach(el => el.classList.remove('dragging'));
                    }
                };

                document.addEventListener('mousemove', handleMove);
                document.addEventListener('touchmove', handleMove, {passive: false});
                document.addEventListener('mouseup', handleEnd);
                document.addEventListener('touchend', handleEnd);
            }
        }

        // Lógica Mesero
        function setWaiterFilter(cat) {
            state.pagination.waiterMenu.filter = cat;
            state.pagination.waiterMenu.page = 1; // Reset page
            renderWaiter();
        }

        function selectWaiterTable(id) {
            state.selectedTableId = id;
            state.cart = [];
            state.pagination.waiterMenu.page = 1;
            renderWaiter();
        }

        function addToCart(productId) {
            const p = state.menu.find(x => x.id === productId);
            const ex = state.cart.find(i => i.productId === productId);
            if (ex) ex.quantity++;
            else state.cart.push({ productId, name: p.name, price: p.price, quantity: 1 });
            
            // Efecto sutil sin recargar todo el HTML drásticamente (UX)
            notify(`Añadido: ${p.name}`, 'info');
            renderWaiter();
        }

        function updateCartQty(productId, delta) {
            const item = state.cart.find(i => i.productId === productId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) state.cart = state.cart.filter(i => i.productId !== productId);
            }
            renderWaiter();
        }

        function getCartTotal() {
            return state.cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
        }

        function sendOrder() {
            if (state.cart.length === 0) return;
            
            const table = state.tables.find(t => t.id === state.selectedTableId);
            const subtotal = getCartTotal();
            const tax = subtotal * 0.19; 
            const total = subtotal + tax;

            const existingOrder = state.orders.find(o => o.tableId === table.id && o.status !== 'paid');
            
            if (existingOrder) {
                // Merge items para misma cuenta
                state.cart.forEach(cItem => {
                    const exItem = existingOrder.items.find(i => i.productId === cItem.productId);
                    if(exItem) exItem.quantity += cItem.quantity;
                    else existingOrder.items.push({...cItem});
                });
                existingOrder.subtotal += subtotal;
                existingOrder.tax += tax;
                existingOrder.total += total;
                existingOrder.status = 'pending'; 
            } else {
                state.orders.push({
                    id: Date.now(), tableId: table.id,
                    items: [...state.cart],
                    status: 'pending', subtotal, tax, total,
                    time: new Date().toLocaleTimeString('es-CO', {hour: '2-digit', minute:'2-digit'}),
                    ref: `TK-${Math.floor(Math.random()*9000)+1000}`
                });
            }

            table.status = 'occupied';
            state.cart = [];
            state.selectedTableId = null;
            state.isCartOpenOnMobile = false;
            
            notify(`Orden enviada a cocina (Mesa ${table.name})`, "success");
            renderWaiter();
        }


        // ==========================================
        // MÓDULO 3: VISTA COCINA (KDS)
        // ==========================================

            if (activeTickets.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-24 flex flex-col items-center justify-center text-slate-500">
                        <div class="w-24 h-24 bg-slate-800 rounded-full flex items-center justify-center mb-6 border-4 border-slate-700">
                            <i class="ph-bold ph-check text-4xl text-emerald-500"></i>
                        </div>
                        <h3 class="text-2xl font-black text-white mb-2">Todo bajo control</h3>
                        <p class="text-slate-400 font-medium">No hay comandas pendientes en este momento.</p>
                    </div>`;
                return;
            }

            container.innerHTML = activeTickets.map(order => {
                const table = state.tables.find(t => t.id === order.tableId);
                const isPending = order.status === 'pending';
                
                return `
                    <div class="bg-slate-800 rounded-3xl overflow-hidden border-2 flex flex-col shadow-2xl ${isPending ? 'border-amber-500/50' : 'border-blue-500 animate-pulse-ring'}">
                        <div class="p-4 flex justify-between items-center ${isPending ? 'bg-amber-500/10 border-b border-amber-500/20' : 'bg-blue-500/20 border-b border-blue-500/30'}">
                            <h3 class="font-black text-xl text-white">Mesa ${table ? table.name : '?'}</h3>
                            <div class="flex items-center gap-1.5 px-3 py-1 bg-slate-900/50 rounded-lg text-sm font-bold shadow-inner">
                                <i class="ph-bold ph-clock ${isPending ? 'text-amber-400' : 'text-blue-400'}"></i>
                                <span class="text-white">${order.time}</span>
                            </div>
                        </div>
                        
                        <div class="p-5 flex-1 bg-slate-800/50">
                            <ul class="space-y-4">
                                ${order.items.map(item => `
                                    <li class="flex items-start gap-4">
                                        <span class="font-black text-lg min-w-[2.5rem] h-10 flex items-center justify-center rounded-xl bg-slate-700 text-white shadow-inner border border-slate-600">${item.quantity}</span>
                                        <span class="text-slate-200 font-bold text-lg leading-tight pt-1">${item.name}</span>
                                    </li>

                        <div class="p-4 bg-slate-900 border-t border-slate-700">

                                    <i class="ph-bold ph-fire"></i> Preparar
                                </button>
                            ` : `
                                <button onclick="updateOrderStatus(${order.id}, 'ready')" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-black text-lg transition-colors shadow-lg shadow-blue-500/30 active:scale-95 flex justify-center items-center gap-2">
                                    <i class="ph-bold ph-bell-ringing"></i> Despachar
                                </button>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateOrderStatus(orderId, newStatus) {
            const order = state.orders.find(o => o.id === orderId);
            if (order) {
                order.status = newStatus;
                if (newStatus === 'ready') {
                    const table = state.tables.find(t => t.id === order.tableId);
                    notify(`El pedido de la Mesa ${table.name} está LISTO`, 'success');
                }
            }
            renderKitchen();
        }

        setInterval(() => {
            const el = document.getElementById('kitchen-clock');
            if(el) el.innerText = new Date().toLocaleTimeString('es-CO', {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // ==========================================
        // MÓDULO 4: VISTA CAJA
        // ==========================================
        function renderCashier() {
            const container = document.getElementById('cashier-tickets-container');
            const activeOrders = state.orders.filter(o => o.status !== 'paid');
            
            if (activeOrders.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-20 flex flex-col items-center justify-center text-slate-400">
                        <i class="ph-duotone ph-receipt text-7xl mb-4 text-slate-300"></i>
                        <h3 class="text-xl font-bold text-slate-500">Sin cuentas pendientes</h3>
                    </div>`;
                return;
            }

            container.innerHTML = activeOrders.map(order => {
                const table = state.tables.find(t => t.id === order.tableId);
                const isReady = order.status === 'ready';

                return `
                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col hover:shadow-md transition-shadow">
                        <div class="bg-slate-900 p-5 flex justify-between items-center text-white">
                            <div>
                                <h3 class="font-black text-xl">Mesa ${table ? table.name : '?'}</h3>
                                <p class="text-xs text-slate-400 font-mono mt-1">Ref: ${order.ref}</p>
                            </div>
                            <span class="text-xs px-3 py-1.5 rounded-full border font-bold flex items-center gap-1 ${isReady ? 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30' : 'bg-slate-700 text-slate-300 border-slate-600'}">
                                <i class="ph-fill ${isReady ? 'ph-check-circle' : 'ph-cooking-pot'}"></i> ${isReady ? 'Servido' : 'Proceso'}
                            </span>
                        </div>
                        
                        <div class="p-6 flex-1 bg-[radial-gradient(#f1f5f9_1px,transparent_1px)] [background-size:16px_16px]">
                            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                                <div class="space-y-3 mb-4 border-b border-slate-100 pb-4">
                                    ${order.items.map(item => `
                                        <div class="flex justify-between text-sm font-medium text-slate-600">
                                            <span class="truncate pr-2">${item.quantity}x ${item.name}</span>
                                            <span class="shrink-0 text-slate-800">${formatMoney(item.price * item.quantity)}</span>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="space-y-1.5 text-sm font-medium">
                                    <div class="flex justify-between text-slate-500">
                                        <span>Subtotal</span><span>${formatMoney(order.subtotal)}</span>
                                    </div>
                                    <div class="flex justify-between text-slate-500">
                                        <span>IVA (19%)</span><span>${formatMoney(order.tax)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="p-5 bg-white border-t border-slate-200 shrink-0">
                            <div class="flex justify-between items-center mb-5 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                <span class="text-sm font-bold text-slate-500 uppercase tracking-wider">Total</span>
                                <span class="text-3xl font-black text-emerald-600">${formatMoney(order.total)}</span>
                            </div>
                            <button onclick="processPayment(${order.id}, ${table.id})" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black text-lg py-4 rounded-2xl transition-colors shadow-xl shadow-emerald-500/20 flex items-center justify-center gap-2 active:scale-95">
                                <i class="ph-bold ph-currency-dollar text-2xl"></i> Facturar y Liberar
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function processPayment(orderId, tableId) {
            const table = state.tables.find(t => t.id === tableId);
            const order = state.orders.find(o => o.id === orderId);

            // By default, service is 10% of subtotal
            const serviceCharge = order.subtotal * 0.10;

            openModal(`
                <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <h3 class="font-bold text-lg text-slate-800">Procesar Pago - Mesa ${table.name}</h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="ph ph-x text-xl"></i></button>
                </div>
                <div class="p-5 space-y-4">
                    <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-sm font-medium text-slate-600">Subtotal + IVA:</span>
                            <span class="font-bold text-slate-800" id="payment-base-total" data-base="${order.total}">${formatMoney(order.total)}</span>
                        </div>
                        <label class="flex items-center gap-2 cursor-pointer mt-3 p-2 bg-white rounded-lg border border-slate-200 hover:bg-slate-50 transition-colors">
                            <input type="checkbox" id="m-payment-service" class="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500" onchange="updatePaymentTotal(${order.total}, ${serviceCharge})" checked>
                            <span class="text-sm font-medium text-slate-700">Incluir Servicio Voluntario (10%: ${formatMoney(serviceCharge)})</span>
                        </label>
                        <div class="flex justify-between items-center mt-3 pt-3 border-t border-slate-200">
                            <span class="text-base font-bold text-slate-800">Total a Pagar:</span>
                            <span class="text-xl font-black text-emerald-600" id="payment-final-total">${formatMoney(order.total + serviceCharge)}</span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Método de Pago</label>
                        <select id="m-payment-method" class="input-pro cursor-pointer" onchange="toggleCashInput()">
                            <option value="efectivo">Efectivo</option>
                            <option value="tarjeta">Tarjeta (Crédito/Débito)</option>
                            <option value="transferencia">Transferencia</option>
                        </select>
                    </div>

                    <div id="cash-input-container" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Efectivo Recibido</label>
                            <input type="number" id="m-payment-cash" class="input-pro text-lg font-bold text-slate-800" placeholder="Ej: 100000" oninput="calculateChange()">
                        </div>
                        <div class="bg-blue-50 p-3 rounded-xl border border-blue-100 flex justify-between items-center hidden" id="change-container">
                            <span class="text-sm font-bold text-blue-800 uppercase tracking-wider">Cambio a devolver:</span>
                            <span class="text-xl font-black text-blue-600" id="payment-change">$0</span>
                        </div>
                    </div>

                    <button onclick="confirmPayment(${orderId}, ${tableId})" class="w-full mt-2 py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-black rounded-xl shadow-lg shadow-emerald-500/30 transition-colors flex items-center justify-center gap-2">
                        <i class="ph-bold ph-check-circle text-xl"></i> Confirmar Pago
                    </button>
                </div>
            `);
            setTimeout(() => {
                document.getElementById('m-payment-cash').focus();
            }, 100);

            // Set initial total value
            window.currentPaymentTotal = order.total + serviceCharge;
            window.currentServiceChargeAmount = serviceCharge;
        }

        function updatePaymentTotal(baseTotal, serviceAmount) {
            const isChecked = document.getElementById('m-payment-service').checked;
            window.currentPaymentTotal = isChecked ? baseTotal + serviceAmount : baseTotal;
            window.currentServiceChargeAmount = isChecked ? serviceAmount : 0;

            document.getElementById('payment-final-total').innerText = formatMoney(window.currentPaymentTotal);
            calculateChange();
        }

        function toggleCashInput() {
            const method = document.getElementById('m-payment-method').value;
            const container = document.getElementById('cash-input-container');
            if (method === 'efectivo') {
                container.classList.remove('hidden');
                setTimeout(() => document.getElementById('m-payment-cash').focus(), 50);
            } else {
                container.classList.add('hidden');
            }
        }

        function calculateChange() {
            const method = document.getElementById('m-payment-method').value;
            if (method !== 'efectivo') return;

            const cashReceived = parseInt(document.getElementById('m-payment-cash').value) || 0;
            const changeContainer = document.getElementById('change-container');
            const changeDisplay = document.getElementById('payment-change');

            const change = cashReceived - window.currentPaymentTotal;

            if (cashReceived > 0 && change >= 0) {
                changeContainer.classList.remove('hidden');
                changeDisplay.innerText = formatMoney(change);
                changeContainer.classList.remove('bg-red-50', 'border-red-100');
                changeContainer.classList.add('bg-blue-50', 'border-blue-100');
                changeDisplay.classList.remove('text-red-600');
                changeDisplay.classList.add('text-blue-600');
            } else if (cashReceived > 0 && change < 0) {
                changeContainer.classList.remove('hidden');
                changeDisplay.innerText = "Falta " + formatMoney(Math.abs(change));
                changeContainer.classList.remove('bg-blue-50', 'border-blue-100');
                changeContainer.classList.add('bg-red-50', 'border-red-100');
                changeDisplay.classList.remove('text-blue-600');
                changeDisplay.classList.add('text-red-600');
            } else {
                changeContainer.classList.add('hidden');
            }
        }

        function confirmPayment(orderId, tableId) {
            const order = state.orders.find(o => o.id === orderId);
            const method = document.getElementById('m-payment-method').value;

            let cashReceived = 0;
            let change = 0;

            if (method === 'efectivo') {
                cashReceived = parseInt(document.getElementById('m-payment-cash').value) || 0;
                if (cashReceived < window.currentPaymentTotal) {
                    return notify("El efectivo recibido es menor al total a pagar", "error");
                }
                change = cashReceived - window.currentPaymentTotal;
            }

            if (order) {
                order.status = 'paid';
                order.paymentMethod = method;
                order.serviceCharge = window.currentServiceChargeAmount;
                order.finalTotal = window.currentPaymentTotal;
                order.cashReceived = method === 'efectivo' ? cashReceived : window.currentPaymentTotal;
                order.change = change;

                // Calculate total cost of items
                let totalCost = 0;
                order.items.forEach(item => {
                    const menuItem = state.menu.find(m => m.id === item.productId);
                    if (menuItem) {
                        totalCost += (menuItem.cost || 0) * item.quantity;
                    }
                });
                order.totalCost = totalCost;
                // Calculate profit: Total Sold (excluding tax/service, assuming prices have margin) - Cost
                order.profit = order.subtotal - totalCost;
            }
            
            const table = state.tables.find(t => t.id === tableId);
            if (table) table.status = 'free';

            closeModal();

            let msg = `Pago procesado (${method}).`;
            if (method === 'efectivo' && change > 0) {
                msg += ` Cambio: ${formatMoney(change)}`;
            }

            notify(msg, 'success');
            renderCashier();
        }

        // --- INICIALIZACIÓN ---
        window.onload = () => {
            render();
            // Mensaje bienvenida simulando sistema
            setTimeout(() => notify("Sistema RestoPro iniciado y sincronizado.", "info"), 1000);
        };
    </script>
</body>
</html>
